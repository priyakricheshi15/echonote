<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>EchoNote | Theme + Voice Commands</title>
  <!-- Bootstrap + Icons + Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="light">

  <!-- Floating Theme Selector -->
  <div class="theme-selector shadow-lg">
    <div class="theme-btn" data-theme="light" style="background: #f6f9fc; border-color: #aaa;"></div>
    <div class="theme-btn" data-theme="dark" style="background: #0f172a;"></div>
    <div class="theme-btn" data-theme="ocean" style="background: #bae6fd;"></div>
    <div class="theme-btn" data-theme="sunset" style="background: #ffe4e6;"></div>
    <div class="theme-btn" data-theme="forest" style="background: #bbf7d0;"></div>
    <div class="color-picker-btn" id="customColorBtn" title="Custom primary color"></div>
    <input type="color" id="customColorPicker" style="display: none;">
  </div>

  <nav class="navbar navbar-echo sticky-top py-3">
    <div class="container">
      <a class="navbar-brand fw-bold fs-3 d-flex align-items-center gap-2" href="#">
        <i class="bi bi-soundwave fs-2" style="color:#4f46e5"></i>
        <span class="brand-icon">EchoNote</span>
        <span class="badge bg-secondary rounded-pill fs-6">theme + voice</span>
      </a>
      <div class="d-flex gap-2">
        <button id="randomEchoBtn" class="btn btn-sm btn-primary-grad rounded-pill"><i class="bi bi-shuffle"></i> Random</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
      <div>
        <h1 class="display-6 fw-bold">✧ Echo your ideas</h1>
        <p class="text-secondary">Type, mic, or voice commands — choose your theme from bottom left</p>
      </div>
      <button class="btn btn-primary-grad px-4 py-2 rounded-pill" data-bs-toggle="modal" data-bs-target="#noteModal" id="openAddBtn">
        <i class="bi bi-plus-lg"></i> New Echo
      </button>
    </div>

    <!-- Voice command status -->
    <div class="row mb-4 align-items-center">
      <div class="col-md-6">
        <div class="d-inline-flex align-items-center gap-2 bg-light bg-opacity-25 rounded-pill px-3 py-1">
          <i class="bi bi-mic" id="cmdMicIcon"></i>
          <span id="voiceCmdStatus">🎙️ Voice commands active</span>
          <button id="startCmdBtn" class="btn btn-sm btn-outline-primary rounded-pill ms-2">Start</button>
        </div>
      </div>
      <div class="col-md-6 text-md-end">
        <button class="btn btn-outline-secondary rounded-pill me-2" id="exportNotesBtn"><i class="bi bi-download"></i> Export</button>
        <button class="btn btn-outline-secondary rounded-pill" id="importNotesBtn"><i class="bi bi-upload"></i> Import</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>
    </div>

    <!-- Search & stats -->
    <div class="row g-3 align-items-end mb-4">
      <div class="col-md-6">
        <div class="input-group shadow-sm rounded-pill overflow-hidden">
          <span class="input-group-text bg-white border-0 ps-3"><i class="bi bi-search"></i></span>
          <input type="text" class="form-control border-0 py-2" id="searchInput" placeholder="Search notes...">
          <span class="input-group-text bg-white border-0 pe-3 search-clear" id="clearSearchBtn"><i class="bi bi-x-circle"></i></span>
        </div>
      </div>
      <div class="col-md-6 text-md-end">
        <span class="badge bg-white text-dark px-3 py-2 rounded-pill shadow-sm me-2"><i class="bi bi-files"></i> <span id="notesCounter">0</span> notes</span>
        <button class="btn btn-danger btn-sm rounded-pill" id="clearAllNotesBtn"><i class="bi bi-trash"></i> Clear all</button>
      </div>
    </div>

    <div id="notesGrid" class="row g-4"></div>
    <div id="liveToastContainer" class="toast-custom"></div>
  </main>

  <!-- Modal for Add/Edit Note -->
  <div class="modal fade" id="noteModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pt-4 px-4">
          <h5 class="modal-title fw-bold" id="noteModalLabel"><i class="bi bi-pencil-square me-2"></i>New Echo</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body px-4">
          <input type="hidden" id="editNoteId">
          <div class="mb-3">
            <label class="form-label fw-semibold">Title *</label>
            <input type="text" class="form-control rounded-3" id="noteTitle" placeholder="Title">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold"><i class="bi bi-mic"></i> Voice Language</label>
            <select class="form-select rounded-3" id="voiceLanguage">
              <option value="en-IN">English (India) - Hinglish</option>
              <option value="hi-IN">हिन्दी (Hindi)</option>
              <option value="en-US">English (US)</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Content</label>
            <div class="input-group">
              <textarea class="form-control rounded-3" id="noteContent" rows="4" placeholder="Type or click mic..."></textarea>
              <button class="btn btn-outline-secondary rounded-3" type="button" id="voiceInputBtn" style="border-top-left-radius:0; border-bottom-left-radius:0;"><i class="bi bi-mic" id="micIcon"></i></button>
            </div>
          </div>
        </div>
        <div class="modal-footer border-0 pb-4 px-4">
          <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary-grad rounded-pill" id="saveNoteBtn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
